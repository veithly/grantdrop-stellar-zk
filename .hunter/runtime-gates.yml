$schema: runtime-gates.v1
rule: "Runtime proof must cover the claim path, receipt replay, negative states, and inspection."

browsers:
  - chromium
  - firefox
  - webkit

devices:
  - name: "iPhone 13"
    browser: webkit
  - name: "Pixel 7"
    browser: chromium

core_flows:
  - campaign_to_valid_claim_receipt
  - invalid_input_to_rejected_receipt
  - duplicate_input_to_already_claimed
  - receipt_refresh_persistence
  - public_receipt_second_context
  - inspect_receipt_proof_and_stellar_reference

a11y_pages:
  - "/campaigns/zk-builder-microgrant"
  - "/receipts/sample"
  - "/receipts/sample#inspect"
  - "/campaigns/zk-builder-microgrant?state=error"

lighthouse_pages:
  - "/campaigns/zk-builder-microgrant"
  - "/receipts/sample"

performance_thresholds:
  lcp_ms: 2500
  inp_ms: 200
  cls: 0.1
  lighthouse_performance_min: 85
  lighthouse_accessibility_min: 90

security_checks:
  - "OWASP: no secrets in client bundle, repo, console output, or public docs"
  - "No broken access control across claimant, public inspector, and maintainer state"
  - "No unsafe HTML rendering of receipt fields"
  - "No paid state without proof and Stellar reference"

llm_redteam_checks:
  - "not applicable: non-LLM app, no prompt injection surface"
  - "not applicable: no retrieved or uploaded content is interpreted by an LLM"
  - "Sensitive data exfiltration case: private input and witness must never persist"
  - "Unsafe output rendering case: receipt fields are escaped"
  - "Tool misuse not applicable: no autonomous LLM tools"

required_artifacts_on_failure:
  - playwright_trace_zip
  - full_page_screenshot
  - console_and_network_log
  - reproduction_command
